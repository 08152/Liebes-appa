<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Liebes Ergebnis</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

#names{
  font-size:22px;
  margin-bottom:10px;
}

#percent{
  font-size:40px;
  margin-bottom:10px;
}

.heart-wrapper{
  position:relative;
  width:200px;
  height:200px;
}

.heart-outline{
  position:absolute;
  width:100%;
  height:100%;
  stroke:black;
  stroke-width:3;
  fill:none;
}

.heart-fill{
  position:absolute;
  width:100%;
  height:100%;
  fill:red;
  transform:scaleY(0);
  transform-origin:bottom;
  transition:0.2s linear;
}
</style>
</head>

<body>

<div id="names"></div>
<div id="percent">0%</div>

<div class="heart-wrapper">
  <!-- Fill -->
  <svg viewBox="0 0 24 24" class="heart-fill" id="fill">
    <path d="M12 21s-6.7-4.3-9.3-7.6C-0.2 10.2 1.1 5.5 5.2 5.2
    7.6 5 9.2 6.4 12 9.1 14.8 6.4 16.4 5 18.8 5.2
    22.9 5.5 24.2 10.2 21.3 13.4 18.7 16.6 12 21 12 21z"/>
  </svg>

  <!-- Outline -->
  <svg viewBox="0 0 24 24" class="heart-outline">
    <path d="M12 21s-6.7-4.3-9.3-7.6C-0.2 10.2 1.1 5.5 5.2 5.2
    7.6 5 9.2 6.4 12 9.1 14.8 6.4 16.4 5 18.8 5.2
    22.9 5.5 24.2 10.2 21.3 13.4 18.7 16.6 12 21 12 21z"/>
  </svg>
</div>

<script>
const name = localStorage.getItem("name") || "";
const text = localStorage.getItem("text") || "";

// Name normal anzeigen
document.getElementById("names").innerText = "Ergebnis für " + name;

// Fake KI
function fakeAI(t){
  let clean = t.toLowerCase();

  // 💥 Spezialregel
  if(clean.includes("sophie") || clean.includes("richard")){
    return 100;
  }

  let score = 50;

  const good = ["gut","lieb","schön","cool","nett","mag","super","toll"];
  const bad = ["doof","schlecht","hass","blöd","hässlich"];

  good.forEach(w => { if(clean.includes(w)) score += 10; });
  bad.forEach(w => { if(clean.includes(w)) score -= 10; });

  return Math.max(51, Math.min(100, score));
}

const result = fakeAI(text);

let current = 0;

const percent = document.getElementById("percent");
const fill = document.getElementById("fill");

const interval = setInterval(() => {
  if(current >= result){
    clearInterval(interval);
  } else {
    current++;

    percent.innerText = current + "%";
    fill.style.transform = `scaleY(${current/100})`;
  }
}, 35);
</script>

</body>
</html>
